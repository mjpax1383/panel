name: Host 3x-ui Panel

on:
  workflow_dispatch:   # manual trigger

jobs:
  host:
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Generate random credentials
        run: |
          echo "PANEL_USER=admin" >> $GITHUB_ENV
          echo "PANEL_PASS=$(openssl rand -base64 12)" >> $GITHUB_ENV
          echo "PANEL_PORT=2053" >> $GITHUB_ENV

      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y curl openssl

      - name: Install 3x-ui
        run: |
          curl -Ls https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh -o install.sh
          echo "" | sudo bash install.sh

      - name: Configure panel port
        run: |
          sudo sed -i "s/\"port\":[0-9]*/\"port\": ${{ env.PANEL_PORT }}/" /etc/x-ui/config.json
          grep '"port"' /etc/x-ui/config.json

      - name: Start panel manually
        run: |
          sudo systemctl stop x-ui 2>/dev/null || true
          sudo nohup /usr/local/x-ui/x-ui > /tmp/x-ui.log 2>&1 &
          sleep 5
          if ! ss -tlnp | grep -q ":${{ env.PANEL_PORT }}"; then
            echo "Panel failed to start. Log:"
            cat /tmp/x-ui.log
            exit 1
          fi

      - name: Set custom login credentials
        run: |
          sudo /usr/local/x-ui/x-ui setting -username ${{ env.PANEL_USER }} -password ${{ env.PANEL_PASS }}

      - name: Install cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Expose panel via Cloudflare Tunnel
        run: |
          ./cloudflared tunnel --url http://localhost:${{ env.PANEL_PORT }} > cloudflared.log 2>&1 &
          sleep 10
          url=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflared.log | head -1)
          if [ -z "$url" ]; then
            echo "Tunnel URL not obtained. Log:"
            cat cloudflared.log
            exit 1
          fi
          echo "============================================"
          echo "  3x-ui Panel is ready!"
          echo "  URL:      $url"
          echo "  Username: ${{ env.PANEL_USER }}"
          echo "  Password: ${{ env.PANEL_PASS }}"
          echo "  This session will last up to 6 hours."
          echo "============================================"
          tail -f /dev/null
