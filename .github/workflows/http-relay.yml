name: Host 3x-ui Panel

on:
  workflow_dispatch:   # manual trigger from the Actions tab

jobs:
  host:
    runs-on: ubuntu-latest
    timeout-minutes: 360   # maximum GitHub job lifetime

    steps:
      - name: Generate random credentials
        run: |
          echo "PANEL_USER=admin" >> $GITHUB_ENV
          echo "PANEL_PASS=$(openssl rand -base64 12)" >> $GITHUB_ENV
          echo "PANEL_PORT=2053" >> $GITHUB_ENV

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y curl openssl

      - name: Install 3x-ui
        env:
          PANEL_PORT: ${{ env.PANEL_PORT }}
          PANEL_USER: ${{ env.PANEL_USER }}
          PANEL_PASS: ${{ env.PANEL_PASS }}
        run: |
          # prevent interactive prompts by feeding an empty line
          bash <(curl -Ls https://raw.githubusercontent.com/mhsanaei/3x-ui/master/install.sh) <<< ""

      - name: Start panel manually
        run: |
          # systemctl usually fails on GitHub runners, so we start the binary directly
          nohup /usr/local/x-ui/x-ui > /tmp/x-ui.log 2>&1 &
          sleep 3
          if ! ss -tlnp | grep -q ":${{ env.PANEL_PORT }}"; then
            echo "Panel did not start. Log:"
            cat /tmp/x-ui.log
            exit 1
          fi

      - name: Install cloudflared
        run: |
          curl -L -o cloudflared https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64
          chmod +x cloudflared

      - name: Expose panel via Cloudflare Tunnel
        run: |
          ./cloudflared tunnel --url http://localhost:${{ env.PANEL_PORT }} > cloudflared.log 2>&1 &
          sleep 10
          url=$(grep -o 'https://[^ ]*\.trycloudflare\.com' cloudflared.log | head -1)
          if [ -z "$url" ]; then
            echo "Failed to get tunnel URL. Log:"
            cat cloudflared.log
            exit 1
          fi
          echo "============================================"
          echo "  3x-ui Panel is ready!"
          echo "  URL:      $url"
          echo "  Username: ${{ env.PANEL_USER }}"
          echo "  Password: ${{ env.PANEL_PASS }}"
          echo "  This session will last up to 6 hours."
          echo "============================================"
          # keep the job alive so the tunnel stays open
          tail -f /dev/null
