# .github/workflows/xhttp-relay.yml
name: XHTTP-SNI Relay

on:
  workflow_dispatch:
    inputs:
      backend_address:
        description: 'Your Backend Xray Server Address (e.g., panel.yourdomain.com or IP)'
        required: true
      backend_port:
        description: 'Backend Xray Inbound Port (e.g., 443)'
        required: true
        default: '443'
      tunnel_duration:
        description: 'Relay Duration (minutes, max 360)'
        required: true
        default: '60'

jobs:
  relay:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set Up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run XHTTP-SNI Relay
        env:
          BACKEND_ADDRESS: ${{ github.event.inputs.backend_address }}
          BACKEND_PORT: ${{ github.event.inputs.backend_port }}
          TUNNEL_DURATION: ${{ github.event.inputs.tunnel_duration }}
        run: |
          cat > relay.py << 'PYTHON_SCRIPT'
          import http.server
          import socketserver
          import urllib.request
          import ssl
          import os
          import threading
          import time
          import sys

          # --- Configuration from GitHub Actions secrets ---
          TARGET_HOST = os.environ['BACKEND_ADDRESS']
          TARGET_PORT = int(os.environ['BACKEND_PORT'])
          TUNNEL_DURATION = int(os.environ['TUNNEL_DURATION']) * 60
          LISTEN_PORT = 8080
          # -------------------------------------------------

          class ThreadingTCPServer(socketserver.ThreadingMixIn, socketserver.TCPServer):
              allow_reuse_address = True
              daemon_threads = True

          class XHTTPHandler(http.server.BaseHTTPRequestHandler):
              def do_POST(self):
                  """Handle upstream: Client -> Server (HTTP POST)"""
                  content_length = int(self.headers.get('Content-Length', 0))
                  body = self.rfile.read(content_length) if content_length > 0 else b''

                  # Build the real request to your backend
                  target_url = f"https://{TARGET_HOST}:{TARGET_PORT}{self.path}"
                  req = urllib.request.Request(target_url, data=body, method='POST')
                  
                  for header, value in self.headers.items():
                      if header.lower() not in ('host', 'connection'):
                          req.add_header(header, value)

                  # We need to handle self-signed certificates in the tunnel
                  ctx = ssl.create_default_context()
                  ctx.check_hostname = False
                  ctx.verify_mode = ssl.CERT_NONE

                  try:
                      with urllib.request.urlopen(req, context=ctx, timeout=30) as response:
                          # Send response status
                          self.send_response(response.status)
                          
                          # Check if this is a streaming response (SSE or chunked)
                          content_type = response.headers.get('Content-Type', '')
                          if 'text/event-stream' in content_type or response.headers.get('Transfer-Encoding') == 'chunked':
                              # This is the downstream stream - send headers and start streaming
                              self.send_header('Content-Type', content_type)
                              self.send_header('Cache-Control', 'no-cache')
                              self.send_header('Connection', 'keep-alive')
                              self.end_headers()
                              
                              # Stream chunks back to client
                              while True:
                                  chunk = response.read(4096)
                                  if not chunk:
                                      break
                                  self.wfile.write(chunk)
                                  self.wfile.flush()
                          else:
                              # Standard response - copy headers and body
                              for header, value in response.headers.items():
                                  if header.lower() not in ('transfer-encoding', 'connection'):
                                      self.send_header(header, value)
                              self.end_headers()
                              self.wfile.write(response.read())
                  except Exception as e:
                      self.send_response(502)
                      self.end_headers()
                      self.wfile.write(f"Upstream Error: {e}".encode())

              def do_GET(self):
                  """Minimal GET handler for health checks or other requests"""
                  self.send_response(200)
                  self.send_header('Content-Type', 'text/plain')
                  self.end_headers()
                  self.wfile.write(b"XHTTP-SNI Relay is active")

              def log_message(self, format, *args):
                  """Suppress default logging to avoid cluttering the Actions log"""
                  pass

          def shutdown_server(server, duration):
              """Shutdown the server after the specified duration"""
              time.sleep(duration)
              server.shutdown()
              server.server_close()

          if __name__ == "__main__":
              server = ThreadingTCPServer(("0.0.0.0", LISTEN_PORT), XHTTPHandler)
              print(f"XHTTP-SNI Relay listening on port {LISTEN_PORT}")
              print(f"Forwarding to: {TARGET_HOST}:{TARGET_PORT}")
              print(f"Relay will run for {TUNNEL_DURATION // 60} minutes")

              # Start shutdown timer in a separate thread
              shutdown_thread = threading.Thread(target=shutdown_server, args=(server, TUNNEL_DURATION))
              shutdown_thread.daemon = True
              shutdown_thread.start()

              try:
                  server.serve_forever()
              except KeyboardInterrupt:
                  pass
              finally:
                  server.server_close()
          PYTHON_SCRIPT

          python3 relay.py
        timeout-minutes: 360
